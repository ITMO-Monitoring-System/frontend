name: Deploy Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || secrets.SSH_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || secrets.SSH_PORT }}
      DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME || secrets.SSH_USERNAME }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/fizon/frontend' }}
      APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
      DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD || secrets.SSH_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare runtime files
        run: |
          set -Eeuo pipefail

          if [ -n "${APP_ENV_FILE:-}" ]; then
            printf '%s\n' "${APP_ENV_FILE}" > .env.production
          else
            echo "APP_ENV_FILE is not set, keeping server-side .env.production"
          fi

      - name: Setup SSH auth
        run: |
          set -Eeuo pipefail

          KEY_VALUE="${DEPLOY_SSH_PRIVATE_KEY:-${SSH_PRIVATE_KEY:-}}"
          AUTH_MODE=""
          mkdir -p ~/.ssh

          if [ -n "${KEY_VALUE}" ]; then
            KEY_VALUE="$(printf '%s' "${KEY_VALUE}" | tr -d '\r')"
            KEY_VALUE="${KEY_VALUE#\"}"
            KEY_VALUE="${KEY_VALUE%\"}"
            KEY_VALUE="${KEY_VALUE#\'}"
            KEY_VALUE="${KEY_VALUE%\'}"

            printf '%b' "${KEY_VALUE}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key

            if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
              if printf '%s' "${KEY_VALUE}" | tr -d '\n ' | base64 -d > ~/.ssh/deploy_key 2>/dev/null; then
                chmod 600 ~/.ssh/deploy_key
              fi
            fi

            if ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
              AUTH_MODE="key"
              echo "AUTH_MODE=key" >> "$GITHUB_ENV"
              echo "SSH_KEY_PATH=$HOME/.ssh/deploy_key" >> "$GITHUB_ENV"
            else
              echo "SSH key secret is present but invalid, trying password fallback if configured."
            fi
          fi

          if [ -z "${AUTH_MODE}" ] && [ -n "${DEPLOY_PASSWORD:-}" ]; then
            sudo apt-get update
            sudo apt-get install -y sshpass
            AUTH_MODE="password"
            echo "AUTH_MODE=password" >> "$GITHUB_ENV"
          fi

          if [ -z "${AUTH_MODE}" ]; then
            echo "No valid SSH auth configured. Set valid DEPLOY_SSH_PRIVATE_KEY/SSH_PRIVATE_KEY or DEPLOY_PASSWORD/SSH_PASSWORD."
            exit 1
          fi

      - name: Deploy to server
        run: |
          set -Eeuo pipefail

          : "${DEPLOY_HOST:?Missing DEPLOY_HOST (or SSH_HOST) secret}"
          : "${DEPLOY_USERNAME:?Missing DEPLOY_USERNAME (or SSH_USERNAME) secret}"
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          REMOTE="${DEPLOY_USERNAME}@${DEPLOY_HOST}"

          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

          if [ "${AUTH_MODE:-}" = "password" ]; then
            : "${DEPLOY_PASSWORD:?Missing DEPLOY_PASSWORD (or SSH_PASSWORD) secret}"
            export SSHPASS="${DEPLOY_PASSWORD}"
            SSH_PREFIX=(sshpass -e ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p "${DEPLOY_PORT}")
            RSYNC_SSH="sshpass -e ssh -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p ${DEPLOY_PORT}"
          else
            SSH_KEY_PATH="${SSH_KEY_PATH:-$HOME/.ssh/deploy_key}"
            SSH_PREFIX=(ssh -i "${SSH_KEY_PATH}" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p "${DEPLOY_PORT}")
            RSYNC_SSH="ssh -i ${SSH_KEY_PATH} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p ${DEPLOY_PORT}"
          fi

          "${SSH_PREFIX[@]}" "${REMOTE}" "mkdir -p '${DEPLOY_PATH}'"

          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".codex" \
            --exclude "node_modules" \
            --exclude ".env.production" \
            -e "${RSYNC_SSH}" \
            ./ "${REMOTE}:${DEPLOY_PATH}/"

          "${SSH_PREFIX[@]}" "${REMOTE}" <<EOF
            set -Eeuo pipefail
            cd "${DEPLOY_PATH}"

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is not installed on server"
              exit 1
            fi

            COMPOSE_ENV_ARGS=""
            if [ -f ".env.production" ]; then
              COMPOSE_ENV_ARGS="--env-file .env.production"
            fi

            docker compose ${COMPOSE_ENV_ARGS} -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose ${COMPOSE_ENV_ARGS} -f docker-compose.prod.yml ps
            docker image prune -f
          EOF

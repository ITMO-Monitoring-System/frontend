name: Deploy Frontend

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || secrets.SSH_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || secrets.SSH_PORT }}
      DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME || secrets.SSH_USERNAME }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/opt/fizon/frontend' }}
      APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare runtime files
        run: |
          set -Eeuo pipefail

          if [ -n "${APP_ENV_FILE:-}" ]; then
            printf '%s\n' "${APP_ENV_FILE}" > .env.production
          else
            echo "APP_ENV_FILE is not set, keeping server-side .env.production"
          fi

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY || secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to server
        run: |
          set -Eeuo pipefail

          : "${DEPLOY_HOST:?Missing DEPLOY_HOST (or SSH_HOST) secret}"
          : "${DEPLOY_USERNAME:?Missing DEPLOY_USERNAME (or SSH_USERNAME) secret}"
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          REMOTE="${DEPLOY_USERNAME}@${DEPLOY_HOST}"

          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

          ssh -p "${DEPLOY_PORT}" "${REMOTE}" "mkdir -p '${DEPLOY_PATH}'"

          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".codex" \
            --exclude "node_modules" \
            --exclude ".env.production" \
            -e "ssh -p ${DEPLOY_PORT}" \
            ./ "${REMOTE}:${DEPLOY_PATH}/"

          ssh -p "${DEPLOY_PORT}" "${REMOTE}" <<EOF
            set -Eeuo pipefail
            cd "${DEPLOY_PATH}"

            if ! command -v docker >/dev/null 2>&1; then
              echo "docker is not installed on server"
              exit 1
            fi

            COMPOSE_ENV_ARGS=""
            if [ -f ".env.production" ]; then
              COMPOSE_ENV_ARGS="--env-file .env.production"
            fi

            docker compose ${COMPOSE_ENV_ARGS} -f docker-compose.prod.yml up -d --build --remove-orphans
            docker compose ${COMPOSE_ENV_ARGS} -f docker-compose.prod.yml ps
            docker image prune -f
          EOF
